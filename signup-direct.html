<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 직접 접근</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #12162e 100%);
            color: #ffffff;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(18, 22, 46, 0.95);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
        }
        h1 {
            color: #00f2ff;
            margin-bottom: 2rem;
            font-size: 2.5rem;
        }
        .info {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            text-align: left;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 1.5rem;
            background: linear-gradient(135deg, #00f2ff, #00ff88);
            color: #0a0e27;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.2rem;
            margin: 1rem 0;
            transition: opacity 0.3s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .note {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 2rem;
            font-size: 0.9rem;
            text-align: left;
        }
        ul {
            text-align: left;
            margin: 1rem 0;
            padding-left: 1.5rem;
        }
        li {
            margin: 0.5rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 회원가입 페이지</h1>
        
        <div class="info">
            <h3 style="color: #00ff88; margin-bottom: 1rem;">📋 안내</h3>
            <p>메인 페이지에서 JavaScript 오류가 발생할 수 있으므로,<br>
            회원가입 페이지를 직접 열어 테스트하세요.</p>
        </div>
        
        <a href="dquant/signup.html" class="btn">
            ✅ 회원가입 페이지 열기
        </a>
        
        <a href="test-address-search.html" class="btn" style="background: linear-gradient(135deg, #a855f7, #ec4899);">
            🧪 주소 검색 테스트
        </a>
        
        <div class="note">
            <strong>⚠️ 주의사항:</strong>
            <ul>
                <li>회원가입 페이지를 열 때 <strong>Ctrl + Shift + R</strong>로 완전히 새로고침하세요.</li>
                <li><strong>F12</strong>를 눌러 콘솔에서 오류가 없는지 확인하세요.</li>
                <li>주소 검색이 안 되면 직접 입력 기능을 사용하세요.</li>
            </ul>
        </div>
    </div>
</body>
</html>
