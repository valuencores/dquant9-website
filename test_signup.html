<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 테스트</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 4px; white-space: pre-wrap; }
        .error { background: #fee; border: 1px solid #fcc; }
        .success { background: #efe; border: 1px solid #cfc; }
    </style>
</head>
<body>
    <h1>D-QUANT 9.0 회원가입 API 테스트</h1>
    
    <div>
        <button onclick="testSignup()">테스트 회원가입 실행</button>
        <button onclick="checkSchema()">테이블 스키마 확인</button>
        <button onclick="clearLogs()">로그 지우기</button>
    </div>
    
    <div id="logs"></div>
    
    <script>
        function log(message, type = 'log') {
            const logsDiv = document.getElementById('logs');
            const logEntry = document.createElement('div');
            logEntry.className = 'log ' + type;
            logEntry.textContent = new Date().toLocaleTimeString() + ' - ' + message;
            logsDiv.appendChild(logEntry);
            console.log(message);
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }
        
        async function checkSchema() {
            try {
                log('테이블 스키마 확인 중...');
                const response = await fetch('tables/members_v2?limit=1');
                const data = await response.json();
                log('스키마 정보:\n' + JSON.stringify(data.schema, null, 2), 'success');
            } catch (error) {
                log('스키마 확인 오류: ' + error.message, 'error');
            }
        }
        
        async function testSignup() {
            log('테스트 회원가입 시작...');
            
            // 테스트 데이터 생성
            const timestamp = Date.now();
            const testData = {
                signupDate: new Date().toISOString(),
                memberName: '테스트사용자' + timestamp,
                idNumber: '900101-1',
                email: 'test' + timestamp + '@example.com',
                phoneNumber: '010-1234-' + String(timestamp).slice(-4),
                address: '',  // 주소는 선택사항으로 변경됨
                referrer: '디퀀트나인',
                password: 'Test1234!@#',
                investmentAmount: 0,
                dividendRate: '2.0%',
                investorLevel: 'Starter',
                investmentMonths: 0,
                accumulatedDividend: 0
            };
            
            log('전송 데이터:\n' + JSON.stringify(testData, null, 2));
            
            try {
                const response = await fetch('tables/members_v2', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(testData)
                });
                
                log('응답 상태: ' + response.status + ' ' + response.statusText);
                
                if (response.ok) {
                    const result = await response.json();
                    log('✅ 회원가입 성공!\n결과:\n' + JSON.stringify(result, null, 2), 'success');
                    log('✅ 생성된 회원 ID: ' + result.id, 'success');
                    log('✅ 이메일: ' + result.email, 'success');
                    log('✅ 투자자 레벨: ' + result.investorLevel, 'success');
                } else {
                    const error = await response.json();
                    log('❌ 회원가입 실패:\n' + JSON.stringify(error, null, 2), 'error');
                }
            } catch (error) {
                log('❌ 네트워크 오류: ' + error.message, 'error');
            }
        }
        
        // 페이지 로드 시 자동으로 스키마 확인
        window.addEventListener('DOMContentLoaded', function() {
            log('테스트 페이지 준비 완료');
            log('----------------------------');
        });
    </script>
</body>
</html>
