<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 완료 - 디퀀트나인</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-cyan: #00d9ff;
            --accent-emerald: #00ff88;
            --success-green: #10b981;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        /* 배경 애니메이션 */
        .background-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        
        .circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 217, 255, 0.1) 0%, transparent 70%);
            animation: float 20s infinite ease-in-out;
        }
        
        .circle:nth-child(1) {
            width: 400px;
            height: 400px;
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }
        
        .circle:nth-child(2) {
            width: 300px;
            height: 300px;
            bottom: -150px;
            right: -150px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.1) 0%, transparent 70%);
            animation-delay: 5s;
        }
        
        .circle:nth-child(3) {
            width: 250px;
            height: 250px;
            top: 50%;
            right: 10%;
            animation-delay: 10s;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(50px, -50px) scale(1.1);
            }
            66% {
                transform: translate(-30px, 30px) scale(0.9);
            }
        }
        
        /* 메인 컨테이너 */
        .success-container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 90%;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 성공 아이콘 */
        .success-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-emerald) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: iconPop 0.6s ease-out 0.3s both;
        }
        
        @keyframes iconPop {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }
        
        .success-icon::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-emerald) 100%);
            animation: pulse 2s infinite;
            opacity: 0.5;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.3);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 0;
            }
        }
        
        .success-icon i {
            font-size: 60px;
            color: var(--bg-primary);
            position: relative;
            z-index: 1;
        }
        
        /* 텍스트 */
        .success-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-emerald) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeIn 0.6s ease-out 0.6s both;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .success-message {
            font-size: 18px;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-out 0.8s both;
        }
        
        .member-info {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.6s ease-out 1s both;
        }
        
        .member-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .member-info-row:last-child {
            border-bottom: none;
        }
        
        .member-info-label {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .member-info-value {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 16px;
        }
        
        /* 리다이렉트 정보 */
        .redirect-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 16px;
            color: var(--accent-cyan);
            animation: fadeIn 0.6s ease-out 1.2s both;
        }
        
        .countdown {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-emerald) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 217, 255, 0.3);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        /* 버튼 */
        .btn-go-now {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 40px;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-emerald) 100%);
            color: var(--bg-primary);
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            animation: fadeIn 0.6s ease-out 1.4s both;
        }
        
        .btn-go-now:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.4);
        }
        
        /* 반응형 */
        @media (max-width: 600px) {
            .success-container {
                padding: 40px 30px;
            }
            
            .success-icon {
                width: 100px;
                height: 100px;
            }
            
            .success-icon i {
                font-size: 50px;
            }
            
            .success-title {
                font-size: 26px;
            }
            
            .success-message {
                font-size: 16px;
            }
            
            .member-info-value {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="background-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
    
    <div class="success-container">
        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>
        
        <h1 class="success-title">회원가입이 완료되었습니다!</h1>
        
        <p class="success-message">
            디퀀트나인의 회원이 되신 것을 환영합니다.<br>
            로그인 후 다양한 투자 서비스를 이용하실 수 있습니다.
        </p>
        
        <div class="member-info" id="memberInfo">
            <div class="member-info-row">
                <span class="member-info-label">이름</span>
                <span class="member-info-value" id="memberName">-</span>
            </div>
            <div class="member-info-row">
                <span class="member-info-label">이메일</span>
                <span class="member-info-value" id="memberEmail">-</span>
            </div>
            <div class="member-info-row">
                <span class="member-info-label">가입일</span>
                <span class="member-info-value" id="signupDate">-</span>
            </div>
        </div>
        
        <div class="redirect-info">
            <div class="spinner"></div>
            <span><span class="countdown" id="countdown">3</span>초 후 메인 페이지로 이동합니다...</span>
        </div>
        
        <a href="index.html" class="btn-go-now">지금 바로 이동하기</a>
    </div>
    
    <script>
        // URL 파라미터에서 회원 정보 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const memberName = urlParams.get('name') || '회원님';
        const memberEmail = urlParams.get('email') || '';
        const signupDate = urlParams.get('date') || new Date().toISOString();
        
        // 회원 정보 표시
        document.getElementById('memberName').textContent = memberName;
        document.getElementById('memberEmail').textContent = memberEmail;
        
        // 가입일 포맷팅
        const date = new Date(signupDate);
        const formattedDate = date.toLocaleString('ko-KR', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            timeZone: 'Asia/Seoul'
        });
        document.getElementById('signupDate').textContent = formattedDate;
        
        // 카운트다운 및 자동 리다이렉트
        let countdown = 3;
        const countdownEl = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            countdown--;
            countdownEl.textContent = countdown;
            
            if (countdown <= 0) {
                clearInterval(timer);
                window.location.href = 'index.html';
            }
        }, 1000);
        
        // 즉시 이동 버튼
        document.querySelector('.btn-go-now').addEventListener('click', function(e) {
            e.preventDefault();
            clearInterval(timer);
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
