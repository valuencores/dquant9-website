<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=dquant/index.html">
    <title>D-QUANT 9.0 - Redirecting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #0f1824 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .redirect-container {
            text-align: center;
            padding: 3rem;
            max-width: 600px;
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #00f2ff, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #00f2ff;
        }
        
        p {
            font-size: 1.125rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
        }
        
        .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 242, 255, 0.2);
            border-top-color: #00f2ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        .manual-link {
            margin-top: 2rem;
            font-size: 0.95rem;
        }
        
        .manual-link a {
            color: #10b981;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
            padding-bottom: 2px;
        }
        
        .manual-link a:hover {
            color: #34d399;
            border-bottom-color: #34d399;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
            text-align: left;
        }
        
        .feature-item {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 8px;
            padding: 1rem;
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .feature-item i {
            color: #00f2ff;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="logo">📊</div>
        <h1>D-QUANT 9.0</h1>
        <p>AI 기반 퀀트 투자 플랫폼으로 이동 중입니다...</p>
        
        <div class="spinner"></div>
        
        <div class="features">
            <div class="feature-item">
                ✨ AI 자산 분석
            </div>
            <div class="feature-item">
                📈 투자 시뮬레이션
            </div>
            <div class="feature-item">
                🔒 안전한 자산 관리
            </div>
        </div>
        
        <div class="manual-link">
            자동으로 이동되지 않나요? 
            <a href="dquant/index.html">여기를 클릭하세요</a>
        </div>
    </div>
    
    <script>
        // 자동 리디렉션 (메타 태그 백업)
        setTimeout(function() {
            window.location.href = 'dquant/index.html';
        }, 500);
        
        // 로딩 메시지 업데이트
        const messages = [
            'AI 기반 퀀트 투자 플랫폼으로 이동 중입니다...',
            '최신 투자 데이터를 불러오는 중...',
            '보안 연결을 확인하는 중...',
            '거의 다 왔습니다...'
        ];
        
        let messageIndex = 0;
        const messageElement = document.querySelector('p');
        
        setInterval(() => {
            messageIndex = (messageIndex + 1) % messages.length;
            messageElement.style.opacity = '0';
            setTimeout(() => {
                messageElement.textContent = messages[messageIndex];
                messageElement.style.opacity = '1';
            }, 300);
        }, 2000);
    </script>
</body>
</html>
